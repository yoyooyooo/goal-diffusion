schema_version: 2
id: "2026-05-23-goal-relations-protocol"
status: done

objective: "Define the minimal Goal Relations protocol so Goal Packs can form evidence-linked threads without becoming nested plans or broad bundled goals."
guiding_principle: "Goal Proof System should let agents continue a line of work across independent Goal Packs while preserving one objective, one completion standard, and one append-only evidence record chain per Goal Pack."

relations:
  thread_id: goal-relations
  links: []

authority_refs:
  - "README.md"
  - "README.zh-CN.md"
  - "skills/goal/goal-proof-system/SKILL.md"
  - "skills/goal/goal-proof-system/references/checker-rules.md"
  - "skills/goal/goal-proof-system/templates/goal.yaml"
  - "skills/goal/goal-proof-system/templates/evidence record.jsonl"
  - "skills/goal/goal-contracts/SKILL.md"
  - "skills/goal/finding-proof-step/SKILL.md"
  - "skills/goal/proof-step-implementation/SKILL.md"

engineering_guidance:
  architecture_notes:
    - "A Goal Pack remains the unit of completion: one objective, one completion standard, one progress state, and one append-only evidence record chain."
    - "A Goal Thread is only a shared thread_id across related Goal Packs; it does not own state, tasks, evidence records, or lifecycle."
    - "A Goal Relation is an evidence-linked cross-pack link stored as metadata in goal.yaml."
    - "The graph view is derived from Goal Relations; it is not a stored planning object."
    - "Retired bundled-goal vocabulary must not appear in current docs, skills, templates, tests, or CLI surfaces."

constraints:
  - "Do not add a thread file, thread lifecycle, thread evidence record, parent work item tree, or child Goal Pack state nesting."
  - "Do not add CLI implementation in this protocol Goal Pack."
  - "Use a single relations.links array; do not split relation storage into multiple overlapping arrays."
  - "Keep relation types minimal: successor_of, depends_on, supersedes, related_to."
  - "Use memdex only as semantic detection; local files and command evidence remain authority."

non_goals:
  - "No CLI relations implementation in this Goal Pack."
  - "No visual graph UI."
  - "No scheduler, roadmap automation, or automatic successor creation."
  - "No migration of external projects."
  - "No stored graph artifact."

completion:
  signal: "Goal Proof System docs, skills, and templates define Goal Thread, Goal Relation, derived graph view, done-pack closure, successor links, and relation-aware completion review guidance without adding a new planning object."
  required_evidence: "Repository check passes; local lexical scan and memdex semantic detection show the retired bundled-goal vocabulary is absent from current guidance; Goal Pack check passes; evidence show relations_protocol_documented=true, thread_id_is_label_only=true, graph_is_derived_view=true, done_pack_append_only_closed=true, successor_uses_predecessor_evidence record=true, and completion review evidence record sets completion_satisfied=true."

claim_limit: "This Goal Pack may claim only the documentation, skill, and template protocol for Goal Relations. It may not claim CLI relation checking, graph rendering, automated successor creation, or project-management graph behavior."

stop_rules:
  - "Stop if the protocol requires a thread-owned lifecycle, thread-owned state, nested Goal Packs, or a stored graph artifact."
  - "Stop if current guidance would need to keep retired bundled-goal vocabulary as a present concept."
  - "Stop if relation semantics cannot be expressed as evidence links to existing Goal Pack evidence records."
  - "Stop if the change requires CLI parser or checker implementation before the protocol is reviewable."

agent_authority:
  continue_by_default: true
  requires_human_decision:
    - objective
    - authority_refs
    - engineering_guidance
    - completion
    - claim_limit
  agent_may_revise:
    - next_slice
    - work_order
    - harness_strength
    - implementation_shape

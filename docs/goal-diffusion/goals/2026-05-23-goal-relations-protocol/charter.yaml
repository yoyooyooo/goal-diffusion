id: "2026-05-23-goal-relations-protocol"
status: done

objective: "Define the minimal Goal Relations protocol so Goal Packs can form evidence-linked threads without becoming nested plans or broad bundled goals."
north_star: "Goal Diffusion should let agents continue a line of work across independent Goal Packs while preserving one objective, one oracle, and one append-only receipt chain per Goal Pack."

goal_relations:
  thread_id: goal-relations
  links: []

authority_refs:
  - "README.md"
  - "README.zh-CN.md"
  - "skills/goal-diffusion/SKILL.md"
  - "skills/goal-diffusion/references/checker-rules.md"
  - "skills/goal-diffusion/templates/charter.yaml"
  - "skills/goal-diffusion/templates/receipt.jsonl"
  - "skills/goal-plans/SKILL.md"
  - "skills/finding-harnessed-path/SKILL.md"
  - "skills/diffusion-implementation/SKILL.md"

engineering_guidance:
  architecture_notes:
    - "A Goal Pack remains the unit of completion: one objective, one oracle, one state, and one append-only receipt chain."
    - "A Goal Thread is only a shared thread_id across related Goal Packs; it does not own state, tasks, receipts, or lifecycle."
    - "A Goal Relation is an evidence-linked cross-pack link stored as metadata in charter.yaml."
    - "The graph view is derived from Goal Relations; it is not a stored planning object."
    - "Retired bundled-goal vocabulary must not appear in current docs, skills, templates, tests, or CLI surfaces."

constraints:
  - "Do not add a thread file, thread lifecycle, thread receipt, parent task tree, or child Goal Pack state nesting."
  - "Do not add CLI implementation in this protocol Goal Pack."
  - "Use a single goal_relations.links array; do not split relation storage into multiple overlapping arrays."
  - "Keep relation types minimal: successor_of, depends_on, supersedes, related_to."
  - "Use memdex only as semantic detection; local files and command evidence remain authority."

non_goals:
  - "No CLI relations implementation in this Goal Pack."
  - "No visual graph UI."
  - "No scheduler, roadmap automation, or automatic successor creation."
  - "No migration of external projects."
  - "No stored graph artifact."

completion:
  signal: "Goal Diffusion docs, skills, and templates define Goal Thread, Goal Relation, derived graph view, done-pack closure, successor links, and relation-aware final audit guidance without adding a new planning object."
  final_proof: "Repository check passes; local lexical scan and memdex semantic detection show the retired bundled-goal vocabulary is absent from current guidance; Goal Pack check passes; receipts show goal_relations_protocol_documented=true, thread_id_is_label_only=true, graph_is_derived_view=true, done_pack_append_only_closed=true, successor_uses_predecessor_receipt=true, and final audit receipt sets oracle_satisfied=true."

claim_boundary: "This Goal Pack may claim only the documentation, skill, and template protocol for Goal Relations. It may not claim CLI relation checking, graph rendering, automated successor creation, or project-management graph behavior."

stop_rules:
  - "Stop if the protocol requires a thread-owned lifecycle, thread-owned state, nested Goal Packs, or a stored graph artifact."
  - "Stop if current guidance would need to keep retired bundled-goal vocabulary as a present concept."
  - "Stop if relation semantics cannot be expressed as evidence links to existing Goal Pack receipts."
  - "Stop if the change requires CLI parser or checker implementation before the protocol is reviewable."

autonomy:
  continue_by_default: true
  cannot_silently_change:
    - objective
    - authority_refs
    - engineering_guidance
    - completion
    - claim_boundary
  agent_may_revise:
    - next_slice
    - task_order
    - harness_strength
    - implementation_shape

id: "2026-05-23-record-stdin-input-cli"
status: done

objective: "Add explicit stdin receipt input to the Goal Diffusion CLI record command so agents can append validated receipts from heredoc without shell-quoting large JSON or creating temporary files."
north_star: "Goal Diffusion CLI write commands should stay atomic and agent-first: content-payload writes accept readable stdin, while state transitions stay explicit and deterministic."

goal_relations:
  thread_id: receipt-cli
  links:
    - goal_id: 2026-05-23-receipts-query-cli
      relation: related_to

authority_refs:
  - "Current conversation: agent-first expectation favors heredoc/stdin for content-style write payloads."
  - "packages/cli/src/goal-diffusion.ts"
  - "packages/cli/src/append-receipt.ts"
  - "packages/cli/src/lib/goal-pack.ts"
  - "packages/cli/src/render-goal-task-dispatch.ts"
  - "packages/cli/test/goal-pack-cli.test.ts"
  - "README.md"
  - "README.zh-CN.md"
  - "packages/cli/README.md"
  - "packages/cli/README.zh-CN.md"
  - "skills/goal-diffusion/SKILL.md"

engineering_guidance:
  architecture_notes:
    - "Agent-facing write commands must keep one primary intent per command."
    - "Content-payload write input should support explicit stdin when payload quoting is error-prone."
    - "State-transition write commands must not accept arbitrary payload input."
    - "Input-source flags for record must be mutually exclusive and must not rely on implicit stdin reads."
    - "User-facing CLI command-surface changes require tests and synchronized docs."

constraints:
  - "Support record --stdin as an explicit receipt JSON input source."
  - "Keep --file and --json behavior compatible."
  - "Do not add heredoc/stdin input to activate or advance."
  - "Do not implicitly read stdin when no input-source flag is supplied."
  - "Do not change receipts.jsonl format or receipt validation semantics."
  - "Do not introduce --file - unless explicitly chosen in a later design."

non_goals:
  - "No receipt schema migration."
  - "No generic stdin support across every write command."
  - "No interactive editor mode."
  - "No YAML receipt input."
  - "No automatic receipt generation."
  - "No shell-specific wrapper command."

completion:
  signal: "goal-diffusion record accepts exactly one input source among --file, --json, and --stdin; --stdin reads a full JSON receipt from stdin and supports heredoc usage; activate and advance remain parameter/state-derived commands with no payload stdin."
  final_proof: "bun run check passes; CLI tests prove record --stdin appends a valid receipt, conflicts with --file and --json, rejects empty stdin, keeps existing --file and --json paths working, and help/docs/skill text describe the command surface; a dogfood receipt is recorded via --stdin; final audit receipt sets oracle_satisfied=true."

claim_boundary: "This Goal Pack may claim only the record command stdin input source and related docs/tests. It may not claim broader write-command redesign, receipt schema changes, activate/advance payload support, or generic heredoc support outside record."

stop_rules:
  - "Stop if supporting --stdin requires changing receipt validation or receipts.jsonl storage."
  - "Stop if Commander cannot express mutual exclusion cleanly without weakening existing --file/--json behavior."
  - "Stop if implementation would require implicit stdin reads that can hang agents."
  - "Stop if docs cannot state a stable rule separating content-payload writes from state-transition writes."

autonomy:
  continue_by_default: true
  cannot_silently_change:
    - objective
    - authority_refs
    - engineering_guidance
    - constraints
    - completion
    - claim_boundary
    - stop_rules
  agent_may_revise:
    - next_slice
    - task_order
    - harness_strength
    - implementation_shape

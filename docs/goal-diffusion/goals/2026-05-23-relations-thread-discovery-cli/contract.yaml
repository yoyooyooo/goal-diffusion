  - "/Users/yoyo/Documents/code/personal/fermi.worktrees/planning"

architecture_standard:
  - "The relations namespace is for Goal Relations derived discovery, filtering, validation, and graph inspection only."
  - "thread_id is a label, not a queue, worklist, scheduler, plan order, registry, or lifecycle object."
  - "New relations commands must find candidate goals and tasks quickly; they must not choose execution order or next action."
  - "Deep implementation context stays in inspect, tasks, receipts, and brief."
  - "The command surface may remove or avoid anything that conflicts with this frozen principle; compatibility is not required for nonconforming proposals."

constraints:
  - "Do not add a top-level thread or threads namespace."
  - "Do not add relations queue."
  - "Do not add relations worklist."
  - "Do not add priority, rank, order_confidence, execution_order, or other ordering-promise fields."
  - "Do not add include-linked-targets; avoid mixing thread members with externally referenced targets in discovery filters."
  - "Do not add --thread to top-level summary, list, or tasks."
  - "relations graph must remain a derived relation graph and must not imply execution order."
  - "relations list remains relation metadata; do not turn it into a goal or task list."

non_goals:
  - "No scheduler."
  - "No inferred execution order."
  - "No thread-owned state, receipt stream, task list, graph file, registry, queue, or worklist."
  - "No automatic successor generation."
  - "No UI."
  - "No compatibility preservation for command shapes that violate the frozen principle."

completion_oracle:
  signal: "The CLI exposes relations goals and relations tasks; agents can filter thread-member Goal Packs and tasks by completion and status without any queue or worklist semantics; existing relations list/check/graph keep their narrower metadata, evidence validation, and derived graph meanings."
  final_proof: "bun run check passes; tests prove thread goal discovery, unfinished goal filtering, unfinished task filtering, task status filtering, parent goal filtering, goal-id filtering, invalid filter rejection, unchanged list/check/graph behavior, and docs coverage; fermi.worktrees/planning is usable as an external validation target; the final audit receipt sets oracle_satisfied=true."

claim_boundary: "This Goal Pack may claim only the relations CLI thread discovery and filtering surface plus command-surface convergence. It may not claim an execution queue, scheduler, automatic priority, inferred work order, or thread lifecycle."

stop_rules:
  - "Stop if implementation requires thread-owned state, a queue, a worklist, a scheduler, a registry, or stored graph state."
  - "Stop if a proposed output field implies execution priority or order."
  - "Stop if relation discovery cannot stay read-only over existing Goal Pack files."
  - "Stop if validation against fermi.worktrees/planning would require modifying that external worktree."
  - "Stop if the command surface cannot keep relations list/check/graph semantically narrow."

autonomy_policy:
  continue_by_default: true
  protected_fields:
    - objective
    - authority_refs
    - architecture_standard
    - constraints
    - completion_oracle
    - claim_boundary
    - stop_rules
  agent_may_revise:
    - next_slice
    - task_order
    - harness_strength
    - implementation_shape

id: "2026-05-23-relations-thread-discovery-cli"
status: done

objective: "Converge the relations CLI so agents can quickly discover and filter Goal Pack and task candidates by thread without modeling a thread as an execution queue, scheduler, or independent state object."
north_star: "When an agent knows a thread_id, it can use a small stable relations command surface to find relevant goals and tasks, then use inspect, tasks, receipts, and brief for deeper implementation context."

goal_relations:
  thread_id: goal-relations
  links:
    - goal_id: 2026-05-23-goal-relations-cli-verification
      relation: successor_of
      receipt_ref: T999
      evidence:
        - "T001 receipt proves relations list/check/graph CLI implementation and dogfood verification."
        - "Tests prove thread filtering."
        - "Dogfood graph rendered derived thread view with successor_of edge and evidence=ok."
        - "oracle_satisfied=true"

authority_refs:
  - "Current conversation freeze: relations only discovers and filters candidates; it does not create an execution queue."
  - "packages/cli/src/goal-diffusion.ts"
  - "packages/cli/src/render-goal-relations.ts"
  - "packages/cli/src/summarize-goal-packs.ts"
  - "packages/cli/src/render-goal-tasks.ts"

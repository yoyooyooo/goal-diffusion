schema_version: 2
id: "<goal-id>"
status: forming # forming | ready | running | blocked | done | retired

intent:
  source: "<path-or-url-or-human-message>"
  interpreted_as: "<agent interpretation of the human intent>"
  assumptions: []
  open_questions: []

objective: "<one observable owner outcome>"
guiding_principle: "<far target or invariant that must not be lost>"

relations:
  thread_id: "<thread-label-or-null>"
  links:
    # - goal_id: "<related-goal-id>"
    #   relation: "successor_of" # successor_of | depends_on | supersedes | related_to
    #   evidence_ref: "E999"
    #   evidence:
    #     - "<evidence-token>=true"

authority_refs:
  - "<path-or-url>"

engineering_guidance:
  standards:
    - "<standard path or rule>"
  architecture_notes:
    - "<architecture or method note this goal should obey>"
  quality_bar: "<quality bar for this goal>"
  preferred_proof_path: "<preferred check or evidence path>"

constraints:
  - "<hard constraint>"

non_goals:
  - "<explicit non-goal>"

completion:
  signal: "<observable signal proving the original outcome is true>"
  required_evidence: "<evidence-backed proof required before completion>"

claim_limit: "<what this goal may and may not claim>"

stop_rules:
  - "<when the agent must stop for human or higher-authority decision>"

agent_authority:
  continue_by_default: true
  requires_human_decision:
    - objective
    - completion
    - claim_limit
    - stop_rules
    - authority_refs
  agent_may_revise:
    - proof_step
    - work_order
    - proof_path
    - implementation_shape

evidence_mode: normal # light | normal | strict

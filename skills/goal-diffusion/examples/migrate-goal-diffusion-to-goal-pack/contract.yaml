id: migrate-goal-diffusion-to-goal-pack
status: done

objective: "Migrate the old goal-diffusion skill, phase modules, routing references, templates, and examples to the Goal Pack model."
north_star: "One public entry, one Goal Pack operating model, append-only receipts, checker gate, and agent continuation by default inside the contract."

authority_refs:
  - "skills/goal-diffusion/SKILL.md"
  - "README.md"
  - "skills/goal-diffusion/references/artifact-routing.md"
  - "ai-coding-project-governance docs layer model"

architecture_standard:
  - "Contract / Edge / State / Receipt are the minimum primitives."
  - "Nested skills are internal phases, not competing public workflows."
  - "Old artifact folders migrate to inbox, sources, Goal Packs, receipts, and optional implementation plans."

constraints:
  - "Only claim migration of the goal-diffusion skill source."
  - "Do not claim migration of all historical project artifacts."
  - "Do not change external docs governance authority."

non_goals:
  - "No local board UI."
  - "No hosted state."
  - "No long-term compatibility path for old artifact routing."

completion_oracle:
  signal: "A fresh agent can use the new goal-diffusion skill to create or continue a Goal Pack without needing old artifact taxonomy."
  final_proof: "Checker passes for this Goal Pack, old artifact routing is mapped, phase modules point to Goal Pack fields, and final audit receipt sets oracle_satisfied true."

claim_boundary: "This Goal Pack proves the skill migration model and source files were updated. It does not prove every downstream repository has migrated its old artifacts."

stop_rules:
  - "Stop if the migration requires changing ai-coding-project-governance authority."
  - "Stop if implementation must touch source repo files outside goal-diffusion."
  - "Stop if no honest checker or manual evidence path can validate the migration."

autonomy_policy:
  continue_by_default: true
  protected_fields:
    - objective
    - authority_refs
    - architecture_standard
    - claim_boundary
  agent_may_revise:
    - next_slice
    - task_order
    - harness_strength
    - implementation_shape

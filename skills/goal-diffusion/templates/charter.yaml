id: "<goal-id>"
status: forming # forming | ready | running | blocked | done | retired

intent:
  source: "<path-or-url-or-human-message>"
  interpreted_as: "<agent interpretation of the human intent>"
  assumptions: []
  open_questions: []

objective: "<one observable owner outcome>"
north_star: "<far target that must not be lost>"

goal_relations:
  thread_id: "<thread-label-or-null>"
  links:
    # - goal_id: "<related-goal-id>"
    #   relation: "successor_of" # successor_of | depends_on | supersedes | related_to
    #   receipt_ref: "T999"
    #   evidence:
    #     - "<receipt-evidence-token>=true"

authority_refs:
  - "<path-or-url>"

engineering_guidance:
  standards:
    - "<standard path or rule>"
  architecture_notes:
    - "<architecture or method note this goal should obey>"
  quality_bar: "<quality bar for this goal>"
  preferred_harness: "<preferred check or evidence path>"

constraints:
  - "<hard constraint>"

non_goals:
  - "<explicit non-goal>"

completion:
  signal: "<observable signal proving the original outcome is true>"
  final_proof: "<receipt-backed proof required before completion>"

claim_boundary: "<what this goal may and may not claim>"

stop_rules:
  - "<when the agent must stop for human or higher-authority decision>"

autonomy:
  continue_by_default: true
  cannot_silently_change:
    - objective
    - completion
    - claim_boundary
    - stop_rules
    - authority_refs
  agent_may_revise:
    - next_slice
    - task_order
    - harness_strength
    - implementation_shape

evidence_mode: normal # light | normal | strict

conditional:
  interfaces: []
  data_policy:
  security_boundary:
  migration_guard:
  release_gate:
  coordination:

strict:
  required_checks: []
  required_evidence: []
  provenance: []
